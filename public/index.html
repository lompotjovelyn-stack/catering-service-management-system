<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Catering Service Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom bg-white">
        <div class="container-fluid">
            <span class="navbar-brand fw-semibold">Catering Service Management</span>
            <div class="d-flex align-items-center gap-2">
                <span id="currentUser" class="small text-secondary"></span>
                <button id="logoutButton" class="btn btn-outline-secondary btn-sm d-none">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container-fluid py-4">
        <section id="authView" class="auth-layout">
            <div class="auth-panel">
                <ul class="nav nav-tabs" id="authTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#loginForm" type="button">Login</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#registerForm" type="button">Register</button>
                    </li>
                </ul>
                <div class="tab-content border border-top-0 p-3 bg-white">
                    <form id="loginForm" class="tab-pane fade show active">
                        <label class="form-label" for="loginEmail">Email</label>
                        <input id="loginEmail" class="form-control mb-3" type="email" required>
                        <label class="form-label" for="loginPassword">Password</label>
                        <input id="loginPassword" class="form-control mb-3" type="password" required>
                        <button class="btn btn-primary w-100" type="submit">Login</button>
                    </form>
                    <form id="registerForm" class="tab-pane fade">
                        <label class="form-label" for="registerName">Name</label>
                        <input id="registerName" class="form-control mb-3" required>
                        <label class="form-label" for="registerEmail">Email</label>
                        <input id="registerEmail" class="form-control mb-3" type="email" required>
                        <label class="form-label" for="registerPassword">Password</label>
                        <input id="registerPassword" class="form-control mb-3" type="password" required>
                        <label class="form-label" for="registerRole">Account type</label>
                        <select id="registerRole" class="form-select mb-3">
                            <option value="customer">Customer</option>
                            <option value="vendor">Vendor</option>
                        </select>
                        <button class="btn btn-primary w-100" type="submit">Create Account</button>
                    </form>
                </div>
            </div>
        </section>

        <section id="appView" class="d-none">
            <div class="row g-4">
                <aside class="col-12 col-xl-3">
                    <div class="list-group" id="moduleNav"></div>
                </aside>
                <section class="col-12 col-xl-9">
                    <div id="alertArea"></div>
                    <div id="moduleContent"></div>
                </section>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
